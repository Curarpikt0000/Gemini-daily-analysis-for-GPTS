name: Precious Metal Data Lake Sync

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 关键：赋予 Actions 写仓库的权限
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests google-genai pdfplumber

      - name: Run logic and Archive data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 自动获取，无需手动设 Secret
        run: python daily_gemini_analysis.py

      # 关键：如果有新文件下载，自动提交回仓库
      - name: Commit and push changes
        run: |
          git config --global user.name "DataBot"
          git config --global user.email "bot@github.com"
          git add data/
          git commit -m "Archive latest CME/CFTC data: $(date +'%Y-%m-%d')" || echo "No new data to commit"
          git push
