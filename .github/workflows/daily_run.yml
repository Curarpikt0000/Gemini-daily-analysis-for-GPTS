name: Precious Metal Data Lake Sync & Analysis

on:
  schedule:
    # 每天东京时间早上 9:00 自动运行 (对应 UTC 0:00)
    - cron: '0 0 * * 1-5'
  workflow_dispatch: # 允许手动点击 Run workflow 触发测试

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 必须显式开启仓库写权限，否则无法更新文件夹
    permissions:
      contents: write

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. 设置 Python 环境 (匹配您的 3.9 版本)
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. 安装 Necessary Dependencies (核心修正)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai pdfplumber

      # 4. 执行数据同步与清洗脚本
      - name: Run Analysis Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_gemini_analysis.py

      # 5. 核心修正：将云端新产生的文件 Push 回 GitHub 仓库
      - name: Commit and Push Data Lake
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          # 确保 data/ 文件夹被加入
          git add data/
          # 检查是否有新解析的文件
          if git diff --staged --quiet; then
            echo "没有发现新解析的数据，不需要存档提交。"
          else
            git commit -m "Auto-archive: Synchronized CME/CFTC data lake $(date +'%Y-%m-%d')"
            git push
          fi
