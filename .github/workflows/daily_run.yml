name: Precious Metal Data Lake Sync & Analysis

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      id-token: write # 谷歌鉴权需要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 新增：Google Cloud 鉴权步骤
      - name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 注意这里换成了 google-cloud-aiplatform
          pip install requests google-cloud-aiplatform pdfplumber

      - name: Run Analysis Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          # 不再需要 GEMINI_API_KEY，由 auth 步骤处理
        run: python daily_gemini_analysis.py

      - name: Commit and Push Data Lake
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add data/ || true
          if git diff --staged --quiet; then
            echo "没有发现新解析的数据，不需要存档提交。"
          else
            git commit -m "Auto-archive: Synchronized CME/CFTC data lake $(date +'%Y-%m-%d')"
            git push
          fi
