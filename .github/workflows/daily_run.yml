name: Daily Precious Metal Analysis

on:
  schedule:
    # 每天东京时间早上 9:00 运行 (对应 UTC 0:00)
    - cron: '0 0 * * 1-5'
  workflow_dispatch: # 允许您在网页上点击按钮手动触发测试

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests google-genai

      - name: Run analysis script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_gemini_analysis.py
